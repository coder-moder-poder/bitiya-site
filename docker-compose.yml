services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: bitiya_db
      POSTGRES_USER: bitiya_user
      POSTGRES_PASSWORD: Shalashino1720
    networks:
      - internal_network

  web:
    build: .
    restart: always
    depends_on:
      - db
    command: sh -c "python manage.py migrate && gunicorn Bitiya_Site.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DATABASE_URL: postgresql://bitiya_user:Shalashino1720@db:5432/bitiya_db
    networks:
      - internal_network

networks:
  internal_network:
    driver: bridge